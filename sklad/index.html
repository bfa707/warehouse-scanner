<style>
  html, body { margin: 0; height: 100%; background: #fff; overflow: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  /* Склад — внутри айфрейма на весь экран */
  #app { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; background: #fff; z-index: 2; }
  /* Сплэш поверх айфрейма, пока грузится склад */
  #splash { position: fixed; inset: 0; z-index: 3; background: #fff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 24px; transition: opacity .35s ease; }
  #splash.hide { opacity: 0; pointer-events: none; }
  #splash img { width: 165px; height: 165px; animation: breathe 1.9s ease-in-out infinite; }
  #splash .brand { font-size: 34px; font-weight: 800; letter-spacing: 4px;
                   background: linear-gradient(100deg, #1a1a1a 30%, #b9b9b9 50%, #1a1a1a 70%); background-size: 220% 100%;
                   -webkit-background-clip: text; background-clip: text; color: transparent;
                   animation: shimmer 2s linear infinite; }
  @keyframes breathe { 0%,100% { opacity: .82; transform: scale(1); } 50% { opacity: 1; transform: scale(1.045); } }
  @keyframes shimmer { 0% { background-position: 220% 0; } 100% { background-position: -220% 0; } }
