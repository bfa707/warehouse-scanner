<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<!-- открытие как полноэкранное приложение (без панелей Safari), если добавить на экран «Домой» -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Сканер">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111">
<title>Склад</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #111; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .bar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #000; position: sticky; top: 0; z-index: 5; }
  .bar h1 { font-size: 20px; margin: 0; font-weight: 600; }
  .bar .back { color: #6cb2ff; text-decoration: none; font-size: 18px; }
  /* Компактность — за счёт обрезки контейнером, видео НЕ трогаем (иначе сканер
     читает не то, что видно, и не ловит код). overflow прячет верх/низ кадра,
     центр (куда наводят QR) виден и распознаётся. */
  .cam-wrap { position: relative; width: 100%; max-width: 440px; margin: 8px auto 0; }
  #reader { width: 100%; height: 250px; position: relative; overflow: hidden;
            border-radius: 12px; background: #000; }
  #reader:empty { display: none; }                 /* камера выключена — не занимает место */
  #reader video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                  width: 100% !important; height: auto !important; display: block; }
  /* рамка-прицел: держи QR внутри неё — тогда и расстояние, и белое поле верные */
  .aim { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
         width: 165px; height: 165px; border: 3px solid rgba(255,255,255,.85);
         border-radius: 12px; pointer-events: none; display: none; }
  .start { display: block; width: calc(100% - 32px); max-width: 380px; margin: 16px auto 6px;
           font-size: 20px; font-weight: 700; background: #0b8043; color: #fff; border: none;
           border-radius: 12px; padding: 16px 20px; cursor: pointer; }
  .hint { color: #888; font-size: 13px; text-align: center; }
  .err  { color: #ff7676; text-align: center; padding: 14px 16px; font-size: 16px; }
  .head { display: flex; align-items: center; justify-content: space-between;
          max-width: 640px; margin: 8px auto 0; padding: 0 16px; }
  .head h2 { font-size: 16px; color: #aaa; font-weight: 500; margin: 14px 0 8px; }
  .clear { background: none; color: #6cb2ff; border: none; font-size: 15px; cursor: pointer; }
  .list { max-width: 640px; margin: 0 auto; padding: 0 16px 28px; }

  /* карточка отсканированной единицы */
  .card { position: relative; display: flex; align-items: center; gap: 12px;
          background: #1d1d1d; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
          border-left: 5px solid #555; }
  .card.ok   { border-left-color: #0b8043; }
  .card.bad  { border-left-color: #d93025; }
  .card.warn { border-left-color: #e8a317; }
  .card .del { position: absolute; top: 4px; right: 6px; width: 32px; height: 32px;
               border: none; background: transparent; color: #888; font-size: 20px;
               line-height: 1; padding: 0; cursor: pointer; }
  .card .del:active { color: #fff; }
  .card .thumb { width: 64px; height: 64px; flex-shrink: 0; border-radius: 8px;
                 overflow: hidden; background: #333; display: flex;
                 align-items: center; justify-content: center; }
  .card .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card .thumb .ph { color: #888; font-size: 24px; }
  .card .meta { flex: 1; min-width: 0; padding-right: 22px; }   /* место под крестик */
  .card .name { font-size: 18px; font-weight: 600; line-height: 1.2; }
  .card .attr { font-size: 14px; color: #bbb; margin-top: 3px; }
  .card .attr:empty { display: none; }              /* пустой цвет/размер не занимает место */
  .card .price { font-size: 24px; font-weight: 700; color: #9a9a9a;
                 flex-shrink: 0; white-space: nowrap; }
</style>
</head>
<body>
  <div class="bar"><a id="back" class="back" href="#" style="display:none">← Назад в склад</a></div>

  <div class="cam-wrap">
    <div id="reader"></div>
    <div class="aim" id="aim"></div>
  </div>
  <button id="start" class="start" type="button">▶ Включить камеру</button>
  <div class="hint" id="aimhint" style="display:none">Держите QR внутри рамки (~15–20 см), чтобы вокруг кода было белое поле.</div>
  <div id="err" class="err"></div>

  <div class="head"><h2 id="cnt">Отсканировано: 0</h2><button id="clear" class="clear" type="button">Очистить</button></div>
  <div id="list" class="list"></div>

  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    // Адрес склада (/exec) приходит параметром ?back=… от приложения. Он же —
    // и ссылка «← Назад», и база для запросов данных о товаре (action=lookup).
    var GAS = '';
    (function () {
      var m = location.search.match(/[?&]back=([^&]+)/);
      if (m && m[1]) {
        GAS = decodeURIComponent(m[1]);
        var b = document.getElementById('back');
        b.href = GAS;                        // запасной вариант (если нет истории)
        b.style.display = '';
        // Быстрый возврат: шаг назад по истории — айфон достаёт страницу склада
        // из памяти моментально, без долгой перезагрузки веб-приложения.
        b.addEventListener('click', function (e) {
          e.stopPropagation();                      // не запускать камеру при выходе
          if (history.length > 1) { e.preventDefault(); history.back(); }
        });
      }
    })();

    var qr = null, seen = {}, total = 0;
    var startBtn = document.getElementById('start');
    var aim      = document.getElementById('aim');
    var aimHint  = document.getElementById('aimhint');
    var errBox   = document.getElementById('err');
    var listEl   = document.getElementById('list');
    var cntEl    = document.getElementById('cnt');

    function showErr(t) { errBox.textContent = t || ''; }

    function beep() {
      try {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        var o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.frequency.value = 880; o.start();
        g.gain.setValueAtTime(0.2, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.15);
        o.stop(ac.currentTime + 0.16);
      } catch (e) {}
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }
    function nowTime() {
      var d = new Date();
      return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    // Запрос данных о единице у склада через JSONP (обход CORS для внешней страницы).
    // onData получает объект {found,name,variant,photoUrl,...} либо null (нет связи).
    var jsonpId = 0;
    function lookup(uid, onData) {
      if (!GAS) { onData(null); return; }
      var cb = 'cb_' + (++jsonpId);
      var s = document.createElement('script');
      var done = false;
      var timer = setTimeout(function () { finish(null); }, 8000);
      function finish(data) {
        if (done) return; done = true;
        clearTimeout(timer);
        try { delete window[cb]; } catch (e) { window[cb] = undefined; }
        if (s.parentNode) s.parentNode.removeChild(s);
        onData(data);
      }
      window[cb] = function (data) { finish(data); };
      s.onerror = function () { finish(null); };
      var sep = GAS.indexOf('?') >= 0 ? '&' : '?';
      s.src = GAS + sep + 'action=lookup&uid=' + encodeURIComponent(uid) + '&callback=' + cb;
      document.body.appendChild(s);
    }

    function onScan(text) {
      if (seen[text]) return;   // этот код уже в списке — не дублируем, сколько бы ни держали камеру
      seen[text] = true;        // сбрасывается только кнопкой «Очистить»
      beep();
      if (navigator.vibrate) navigator.vibrate(80);
      total++;
      cntEl.textContent = 'Отсканировано: ' + total;

      var card = document.createElement('div');
      card.className = 'card loading';
      card.innerHTML =
        '<button class="del" type="button" aria-label="Удалить">✕</button>' +
        '<div class="thumb"><div class="ph">…</div></div>' +
        '<div class="meta"><div class="name">Загрузка…</div>' +
        '<div class="attr color"></div><div class="attr size"></div></div>' +
        '<div class="price"></div>';
      listEl.insertBefore(card, listEl.firstChild);

      // крестик — удалить именно эту карточку (код снова можно отсканировать)
      card.querySelector('.del').addEventListener('click', function (e) {
        e.stopPropagation();                          // не запускать камеру
        if (card.parentNode) card.parentNode.removeChild(card);
        delete seen[text];
        total = Math.max(0, total - 1);
        cntEl.textContent = 'Отсканировано: ' + total;
      });

      lookup(text, function (data) {
        var thumb   = card.querySelector('.thumb');
        var nameEl  = card.querySelector('.name');
        var colorEl = card.querySelector('.color');
        var sizeEl  = card.querySelector('.size');
        var priceEl = card.querySelector('.price');
        if (data && data.found) {
          card.className = 'card ok';
          nameEl.textContent = data.nameRu || data.name || ('№ ' + (data.num || ''));
          var cs = splitVariant(data.variant);
          colorEl.textContent = cs.color;
          sizeEl.textContent  = cs.size;
          priceEl.textContent = (data.price || data.price === 0) ? ('' + data.price) : '';
          if (data.photoUrl) {
            var img = document.createElement('img');
            img.alt = '';
            img.onerror = function () { thumb.innerHTML = '<div class="ph">📦</div>'; };
            img.src = data.photoUrl;
            thumb.innerHTML = ''; thumb.appendChild(img);
          } else {
            thumb.innerHTML = '<div class="ph">📦</div>';
          }
        } else if (data) {
          card.className = 'card bad';
          thumb.innerHTML = '<div class="ph">❓</div>';
          nameEl.textContent = 'Не найдено на складе';
        } else {
          card.className = 'card warn';
          thumb.innerHTML = '<div class="ph">⚠️</div>';
          nameEl.textContent = 'Нет связи со складом';
        }
      });
    }

    // Разбить вариант («beige» / «beige XL» / «blue M») на цвет и размер.
    // Размер — токены S/M/L/XL… или число; всё остальное считаем цветом.
    function splitVariant(v) {
      v = (v || '').trim();
      if (!v) return { color: '', size: '' };
      var tokens = v.split(/[\s,\/]+/).filter(Boolean);
      var sizeRe = /^(xxxs|xxs|xs|s|m|l|xl|xxl|xxxl|\d{1,3})$/i;
      var colors = [], sizes = [];
      for (var i = 0; i < tokens.length; i++) {
        if (sizeRe.test(tokens[i])) sizes.push(tokens[i].toUpperCase());
        else colors.push(tokens[i]);
      }
      return { color: colors.join(' '), size: sizes.join(' ') };
    }

    // auto=true — тихая попытка включить камеру при открытии страницы. Сработает,
    // если доступ к камере уже разрешён (iPhone запоминает разрешение для сайта).
    // Если нет — просто показываем кнопку, без красной ошибки (в первый раз iOS
    // требует включать камеру по нажатию). auto=false — нажали кнопку вручную.
    function start(auto) {
      showErr('');
      if (typeof Html5Qrcode === 'undefined') {
        if (!auto) showErr('Не удалось загрузить библиотеку сканера (нет интернета?).');
        startBtn.style.display = 'block';
        return;
      }
      if (qr) return;
      startBtn.style.display = 'none';        // прячем кнопку на время попытки
      qr = new Html5Qrcode('reader');
      qr.start(
        { facingMode: 'environment' },
        { fps: 10 },                         // без qrbox — сканируем весь кадр (цепче всего)
        onScan,
        function () {}                       // ошибки отдельных кадров игнорируем
      ).then(function () {
        startBtn.style.display = 'none';
        aim.style.display = 'block'; aimHint.style.display = 'block';
      }).catch(function (e) {
        qr = null;
        document.getElementById('reader').innerHTML = '';   // чтобы блок схлопнулся
        aim.style.display = 'none'; aimHint.style.display = 'none';
        startBtn.style.display = 'block';     // не вышло — показываем кнопку
        if (!auto) showErr('Камера недоступна: ' + e + '. Разрешите доступ к камере для этого сайта.');
      });
    }

    startBtn.addEventListener('click', function () { start(false); });
    document.getElementById('clear').addEventListener('click', function () {
      listEl.innerHTML = ''; total = 0; seen = {}; cntEl.textContent = 'Отсканировано: 0';
    });

    // Пробуем включить камеру сразу при открытии. Если доступ ещё не разрешён
    // (первый заход на iPhone) — покажется кнопка «Включить камеру».
    start(true);

    // iPhone не даёт включить камеру без касания страницы (правило Safari).
    // Поэтому касание В ЛЮБОМ месте экрана тоже включает камеру — не нужно
    // целиться в кнопку. start() сам ничего не делает, если камера уже идёт.
    document.addEventListener('click', function () { start(false); });
  </script>
</body>
</html>
