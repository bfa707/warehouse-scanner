<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<!-- открытие как полноэкранное приложение (без панелей Safari), если добавить на экран «Домой» -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Сканер">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111">
<title>Склад</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #111; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .bar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #000; position: sticky; top: 0; z-index: 5; }
  .bar h1 { font-size: 20px; margin: 0; font-weight: 600; }
  .bar .back { color: #6cb2ff; text-decoration: none; font-size: 18px; }
  /* Компактность — за счёт обрезки контейнером, видео НЕ трогаем (иначе сканер
     читает не то, что видно, и не ловит код). overflow прячет верх/низ кадра,
     центр (куда наводят QR) виден и распознаётся. */
  .cam-wrap { position: relative; width: 100%; max-width: 440px; margin: 8px auto 0; }
  #reader { width: 100%; height: 250px; position: relative; overflow: hidden;
            border-radius: 12px; background: #000; }
  #reader:empty { display: none; }                 /* камера выключена — не занимает место */
  #reader video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                  width: 100% !important; height: auto !important; display: block; }
  /* рамка-прицел: держи QR внутри неё — тогда и расстояние, и белое поле верные */
  .aim { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
         width: 165px; height: 165px; border: 3px solid rgba(255,255,255,.85);
         border-radius: 12px; pointer-events: none; display: none; }
  /* при qrbox html5-qrcode рисует свою рамку/затемнение — прячем её, оставляем свой .aim */
  #qr-shaded-region { display: none !important; }
  .start { display: block; width: calc(100% - 32px); max-width: 380px; margin: 16px auto 6px;
           font-size: 20px; font-weight: 700; background: #0b8043; color: #fff; border: none;
           border-radius: 12px; padding: 16px 20px; cursor: pointer; }
  .hint { color: #888; font-size: 13px; text-align: center; }
  .err  { color: #ff7676; text-align: center; padding: 14px 16px; font-size: 16px; }
  .head { display: flex; align-items: center; justify-content: space-between;
          max-width: 640px; margin: 8px auto 0; padding: 0 16px; }
  .head h2 { font-size: 16px; color: #aaa; font-weight: 500; margin: 14px 0 8px; }
  .clear { background: none; color: #6cb2ff; border: none; font-size: 15px; cursor: pointer; }
  .showall { display: block; margin: 0 auto 10px; background: #1d1d1d; color: #6cb2ff;
             border: none; border-radius: 10px; padding: 10px 18px; font-size: 15px; cursor: pointer; }
  .list { max-width: 640px; margin: 0 auto; padding: 0 16px 28px; }
  /* свёрнуто: в DOM держим только 7 свежих карточек видимыми, старые скрыты —
     меньше нагрузка на телефон, сканер не захлёбывается при серийном скане */
  .list:not(.show-all) .card:nth-child(n+8) { display: none; }

  /* карточка отсканированной единицы (горизонтально: фото+код | инфо | счётчики справа-внизу) */
  .card { position: relative; display: flex; align-items: flex-start; gap: 12px;
          background: #1d1d1d; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
          border-left: 5px solid #555; cursor: pointer; }
  /* фон по ЦВЕТУ-РАЗМЕРУ: 10 неброских тёмных оттенков ИЗ РАЗНЫХ семейств, чередуются по
     порядку появления — соседние цвета-размеры заметно различаются (серый→синий→коричневый
     →фиолетовый→стальной→тёплый→тёмно-синий→сливовый→хаки→слейт), одинаковые — один фон */
  .card.bg0 { background: #2a2a2a; }   /* серый */
  .card.bg1 { background: #1e3142; }   /* синий */
  .card.bg2 { background: #342a20; }   /* коричневый */
  .card.bg3 { background: #2c2542; }   /* фиолетовый */
  .card.bg4 { background: #24343f; }   /* стальной */
  .card.bg5 { background: #3a2e2c; }   /* тёплый серо-коричневый */
  .card.bg6 { background: #1e2840; }   /* тёмно-синий */
  .card.bg7 { background: #342940; }   /* сливовый */
  .card.bg8 { background: #38322a; }   /* хаки-коричневый */
  .card.bg9 { background: #2a3640; }   /* слейт-синий */
  /* всё принято (скан == закуплено) → тёмно-зелёный фон (перекрывает оттенок) */
  .card.full { background: #15351f; }
  .card.ok   { border-left-color: #0b8043; }   /* учтено в таблице (кол-во изменилось) */
  .card.dup  { border-left-color: #d93025; }   /* уже было пропикано ранее */
  .card.bad  { border-left-color: #d93025; }
  .card.warn { border-left-color: #e8a317; }
  .card.loading { border-left-color: #e8a317; }  /* отсканировано, пишу в таблицу (ещё не учтено) */
  .card .del { position: absolute; top: 4px; right: 6px; width: 32px; height: 32px;
               border: none; background: transparent; color: #888; font-size: 20px;
               line-height: 1; padding: 0; cursor: pointer; z-index: 1; }
  .card .del:active { color: #fff; }
  /* лёгкое НЕблокирующее подтверждение (нативный confirm() морозит камеру на iOS) */
  .askc { position: fixed; inset: 0; z-index: 60; display: none; align-items: center; justify-content: center;
          background: rgba(0,0,0,.6); padding: 24px; }
  .askc.show { display: flex; }
  .askc-box { background: #1f1f1f; border: 1px solid #444; border-radius: 16px; max-width: 360px; width: 100%;
              padding: 18px; box-shadow: 0 12px 40px rgba(0,0,0,.6); }
  .askc-msg { font-size: 17px; color: #eee; font-weight: 600; text-align: center; margin-bottom: 16px; line-height: 1.3; }
  .askc-btns { display: flex; gap: 10px; }
  .askc-btns button { flex: 1; border: none; border-radius: 12px; padding: 13px; font-size: 16px; font-weight: 700; cursor: pointer; }
  .askc-yes { background: #d93025; color: #fff; }
  .askc-no  { background: #444; color: #ddd; }
  /* колонка с фото: ПОД фоткой — код единицы (как на распечатке под QR) */
  .card .thumbcol { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .card .thumb { width: 64px; height: 64px; flex-shrink: 0; border-radius: 8px;
                 overflow: hidden; background: #333; display: flex;
                 align-items: center; justify-content: center; }
  .card .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card .thumb .ph { color: #888; font-size: 24px; }
  .card .unitno { font-size: 13px; color: #8ab4f8; text-align: center; max-width: 76px;
                  font-family: ui-monospace, Menlo, monospace; }   /* код единицы — под фото */
  .card .meta { flex: 1; min-width: 0; padding-right: 22px; }   /* место под крестик */
  /* имя + цена в ОДНУ строку: длинное название обрезается, цена не пропадает */
  .card .name { display: flex; align-items: baseline; font-size: 18px; font-weight: 600; line-height: 1.2; }
  .card .name .nm-text { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .name .pr { flex-shrink: 0; color: #9a9a9a; font-weight: 600; font-size: 0.78em;
                    margin-left: 0.6em; white-space: nowrap; }   /* цена — мельче, светло-серым */
  /* «цвет:»/«размер:» — серым (как было); САМО значение — белым (п.2) */
  .card .attr { font-size: 14px; color: #bbb; margin-top: 3px; }
  .card .attr .val { color: #fff; }
  .card .attr:empty { display: none; }
  .card .dupnote { color: #ff6b6b; font-size: 12px; font-weight: 600; margin-top: 4px; line-height: 1.2; }
  .card .dupnote:empty { display: none; }
  /* счётчики «закуп/скан» — СТОПКОЙ в правом-нижнем углу, БЕЗ расширения карточки (п.1) */
  .card .counts { flex-shrink: 0; align-self: stretch; display: flex; flex-direction: column;
                  justify-content: flex-end; align-items: flex-end;
                  font-size: 14px; color: #9a9a9a; line-height: 1.35; }
  /* тап по карточке → вместо инфо показать список напечатанных наклеек */
  .card .labels { display: none; }
  .card.show-labels .thumbcol, .card.show-labels .meta, .card.show-labels .counts { display: none; }
  .card.show-labels .labels { display: block; font-size: 14px; line-height: 1.7; }
  .card .labels .lt { color: #9a9a9a; }       /* подпись-заголовок */
  .card .labels .done { color: #4cc76a; }     /* отсканированные — зелёным */
  .card .labels .undone { color: #ff6b6b; }   /* неотсканированные — красным */

  /* ─── Режим «Собрать заказ» ─── */
  body.order-mode .head { display: none; }           /* счётчик приёмки не нужен */
  body.order-mode #reader { height: 180px; }          /* окно сканера компактнее */
  #order-head { max-width: 640px; margin: 6px auto 0; padding: 0 16px; display: none; }
  body.order-mode #order-head { display: block; }
  #order-title { font-size: 19px; font-weight: 700; margin: 8px 0 2px; line-height: 1.25; }
  #order-progress { font-size: 15px; color: #bbb; }
  #order-progress.done { color: #4cc76a; font-weight: 700; }
  /* баннер результата скана — мигает на каждый скан */
  #scan-status { max-width: 640px; margin: 8px auto 0; padding: 0 16px; display: none; }
  body.order-mode #scan-status.show { display: block; }
  #scan-status .msg { border-radius: 10px; padding: 10px 14px; font-size: 16px; font-weight: 600; }
  #scan-status.ok   .msg { background: #15351f; color: #7ee2a0; }
  #scan-status.bad  .msg { background: #3a1715; color: #ff9a93; }
  #scan-status.warn .msg { background: #3a3115; color: #ffd98a; }
  /* сетка бейджиков заказанных товаров */
  #order-grid { max-width: 640px; margin: 8px auto 0; padding: 0 16px 28px; display: none; }
  body.order-mode #order-grid { display: block; }
  .ord-empty { color: #888; text-align: center; padding: 24px 8px; font-size: 16px; }
  .obadge { position: relative; display: flex; align-items: flex-start; gap: 12px;
            background: #1d1d1d; border-radius: 12px; padding: 10px 12px; margin-bottom: 8px;
            border-left: 5px solid #555; }
  .obadge.part { border-left-color: #e8a317; }    /* выдано частично */
  .obadge.done { border-left-color: #0b8043; background: #15351f; }  /* выдано полностью */
  .obadge.net  { border-left-color: #9a6b00; opacity: 0.75; }        /* не хватило (net) */
  .obadge.flash { animation: oflash 0.6s ease; }
  @keyframes oflash { 0% { background: #1f5a33; } 100% { background: #1d1d1d; } }
  .obadge.done.flash { animation: oflashdone 0.6s ease; }
  @keyframes oflashdone { 0% { background: #2a7a46; } 100% { background: #15351f; } }
  .obadge .othumb { width: 56px; height: 56px; flex-shrink: 0; border-radius: 8px; overflow: hidden;
                    background: #333; display: flex; align-items: center; justify-content: center; }
  .obadge .othumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .obadge .othumb .ph { color: #888; font-size: 22px; }
  .obadge .ometa { flex: 1; min-width: 0; }
  .obadge .oname { font-size: 16px; font-weight: 600; line-height: 1.2;
                   overflow: hidden; text-overflow: ellipsis; }
  .obadge .oattr { font-size: 14px; color: #bbb; margin-top: 3px; }
  .obadge .oattr .val { color: #fff; }
  .obadge .ochip { flex-shrink: 0; align-self: center; font-size: 17px; font-weight: 700;
                   color: #9a9a9a; min-width: 52px; text-align: right; }
  .obadge.part .ochip { color: #ffce73; }
  .obadge.done .ochip { color: #7ee2a0; }
  .obadge.net  .ochip { color: #d99b4a; font-size: 13px; }
  /* чип = колонка: галка/статус сверху, под ней код наклейки */
  .obadge .ochip { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 2px; }
  .obadge .ocode { font-size: 12px; font-weight: 700; color: #7ee2a0; font-family: ui-monospace, Menlo, monospace; }
  .obadge .ocode:empty { display: none; }
  .obadge.done { cursor: pointer; }                  /* тап по зелёному бейджику = снять выдачу */
  /* в режиме заказа нижняя лента приёмки не нужна — всё через бейджики и попап */
  body.order-mode #list, body.order-mode #showall { display: none; }

  /* ─── Попап «Товар отличается от заказа» ─── */
  .mpop { position: fixed; inset: 0; z-index: 50; display: flex; align-items: flex-start; justify-content: center;
          background: rgba(0,0,0,.72); padding: 16px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .mpop-panel { background: #1b1b1b; border: 1px solid #4a3c14; border-radius: 16px; width: 100%;
                max-width: 560px; margin: auto 0; padding: 16px; box-shadow: 0 12px 40px rgba(0,0,0,.6); }
  .mpop-title { font-size: 18px; font-weight: 800; color: #ff6b6b; line-height: 1.3; margin-bottom: 4px; }
  .mpop-title .x { font-weight: 900; margin-right: 4px; }
  .mpop-title.warn { color: #e8a317; }            /* лишняя вещь (overscan) — это не ошибка, а предупреждение */
  .mpop-sub { font-size: 13px; color: #aaa; margin-bottom: 12px; }
  .mpop-scan { display: flex; gap: 14px; background: #241d0f; border-radius: 12px; padding: 12px; margin-bottom: 14px; }
  .mpop-scan .mphoto { width: 104px; height: 104px; flex-shrink: 0; border-radius: 10px; overflow: hidden;
                       background: #333; display: flex; align-items: center; justify-content: center; }
  .mpop-scan .mphoto img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .mpop-scan .mphoto .ph { color: #888; font-size: 32px; }
  .mpop-scan .minfo { flex: 1; min-width: 0; }
  .mpop-scan .mname { font-size: 17px; font-weight: 700; line-height: 1.25; margin-bottom: 4px; }
  .mpop-scan .mrow { font-size: 14px; color: #bbb; margin-top: 2px; }
  .mpop-scan .mrow .val { color: #fff; }
  .mpop-pick { font-size: 14px; color: #ddd; font-weight: 600; margin: 4px 2px 8px; }
  .mpop-list { display: flex; flex-direction: column; gap: 8px; }
  .mob { display: flex; align-items: center; gap: 12px; background: #232323; border-radius: 12px;
         padding: 10px 12px; border-left: 5px solid #555; }
  .mob.pick { cursor: pointer; } .mob.pick:active { background: #2c2c2c; }
  .mob.disabled { opacity: .45; }
  .mob.done { border-left-color: #0b8043; } .mob.net { border-left-color: #9a6b00; }
  .mob .mob-thumb { width: 46px; height: 46px; flex-shrink: 0; border-radius: 8px; overflow: hidden;
                    background: #333; display: flex; align-items: center; justify-content: center; }
  .mob .mob-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .mob .mob-thumb .ph { color: #888; font-size: 18px; }
  .mob .mob-meta { flex: 1; min-width: 0; }
  .mob .mob-name { font-size: 15px; font-weight: 600; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mob .mob-attr { font-size: 13px; color: #bbb; margin-top: 2px; }
  .mob .mob-attr .val { color: #fff; }
  .mob .mob-state { font-size: 12px; margin-top: 2px; color: #9a9a9a; }
  .mob.done .mob-state { color: #7ee2a0; } .mob.net .mob-state { color: #d99b4a; }
  .mob .mob-check { width: 30px; height: 30px; flex-shrink: 0; border-radius: 8px; border: 2px solid #0b8043;
                   display: flex; align-items: center; justify-content: center; color: #9a9a9a; font-size: 18px; font-weight: 800; }
  .mob.sel .mob-check { color: #7ee2a0; }            /* при нажатии — галочка зелёная */
  .mob.disabled .mob-check { border-color: #555; color: transparent; }
  .mpop-foot { margin-top: 14px; }
  .mpop-close { width: 100%; background: #2a2a2a; color: #ddd; border: none; border-radius: 12px;
                padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
  <div class="bar"><a id="back" class="back" href="#" style="display:none">← Назад</a></div>

  <div class="cam-wrap">
    <div id="reader"></div>
    <div class="aim" id="aim"></div>
  </div>
  <button id="start" class="start" type="button">▶ Включить камеру</button>
  <div id="err" class="err"></div>

  <!-- режим «Собрать заказ»: шапка (ник/сумма/прогресс), баннер результата, бейджики -->
  <div id="order-head"><div id="order-title">Загрузка заказа…</div><div id="order-progress"></div></div>
  <div id="scan-status"><div class="msg"></div></div>
  <div id="order-grid"></div>
  <!-- попап «Товар отличается от заказа» (наполняется из openMismatchPopup) -->
  <div id="mismatch-popup" class="mpop" style="display:none"></div>
  <!-- НЕблокирующее подтверждение (askConfirm) — заменяет нативный confirm(), который морозит камеру на iOS -->
  <div id="askc" class="askc"><div class="askc-box"><div class="askc-msg"></div>
    <div class="askc-btns"><button type="button" class="askc-no">Нет</button><button type="button" class="askc-yes">Да</button></div></div></div>

  <div class="head"><h2 id="cnt">Отсканировано: 0</h2><button id="clear" class="clear" type="button">Очистить</button></div>
  <div id="list" class="list"></div>
  <button id="showall" class="showall" type="button" style="display:none"></button>

  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    // Адрес склада (/exec) приходит параметром ?back=… от приложения. Он же —
    // и ссылка «← Назад», и база для запросов данных о товаре (action=lookup).
    // Параметры из адреса: back=… (адрес склада /exec), и для режима заказа —
    // mode=order, src=<srcId таблицы>, no=<№ заказа>, nick=<ник>.
    function qparam(k) {
      var m = location.search.match(new RegExp('[?&]' + k + '=([^&]*)'));
      return m ? decodeURIComponent(m[1]) : '';
    }
    var GAS = '';
    var MODE = qparam('mode'), SRC = qparam('src'), ORDER_NO = qparam('no'), ORDER_NICK = qparam('nick');
    (function () {
      var back = qparam('back');
      if (back) {
        GAS = back;
        var b = document.getElementById('back');
        b.href = GAS;                        // запасной вариант (если нет истории)
        b.style.display = '';
        // Быстрый возврат: шаг назад по истории — айфон достаёт страницу склада
        // из памяти моментально, без долгой перезагрузки веб-приложения.
        b.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();                      // не запускать камеру при выходе
          // СНАЧАЛА отпускаем камеру: iOS иначе тратит первый тап на её тендаун — отсюда
          // «выход в два нажатия». Промис не ждём — навигируем сразу (qr=null до stop, чтобы
          // повторный тап/document-click не дёргали уже останавливаемую камеру).
          try { if (qr) { var q = qr; qr = null; q.stop().then(function () { q.clear(); }).catch(function () {}); } } catch (_) {}
          if (history.length > 1) history.back(); else location.href = GAS;
        });
      }
    })();

    var qr = null, seen = {}, total = 0;
    var startBtn = document.getElementById('start');
    var aim      = document.getElementById('aim');
    var errBox   = document.getElementById('err');
    var listEl   = document.getElementById('list');
    var cntEl    = document.getElementById('cnt');
    var showAllBtn = document.getElementById('showall');

    // Отпустить камеру при уходе со страницы (надёжный «один тап» на iOS даже через
    // системный жест «назад»): живой видеотрек иначе задерживает выгрузку страницы.
    window.addEventListener('pagehide', function () {
      try { if (qr) { var q = qr; qr = null; q.stop().catch(function () {}); } } catch (_) {}
    });

    // Неблокирующее подтверждение: нативный confirm()/alert() во время активной камеры
    // на iOS подвешивает декодер, и превью не оживает. askConfirm(текст, onYes) показывает
    // лёгкий оверлей с «Да»/«Нет», не блокируя event-loop и видеопоток.
    var _askcWired = false;
    function askConfirm(msg, onYes) {
      var box = document.getElementById('askc');
      box.querySelector('.askc-msg').textContent = msg || 'Подтвердить?';
      box._onYes = onYes || function () {};
      if (!_askcWired) {
        _askcWired = true;
        box.addEventListener('click', function (e) {
          e.stopPropagation();                                  // тап в оверлее не запускает камеру
          if (e.target === box || (e.target.closest && e.target.closest('.askc-no'))) { box.classList.remove('show'); box._onYes = null; return; }
          if (e.target.closest && e.target.closest('.askc-yes')) {
            box.classList.remove('show');
            var f = box._onYes; box._onYes = null; if (f) f();
          }
        });
      }
      box.classList.add('show');
    }

    function showErr(t) { errBox.textContent = t || ''; }

    // Свёрнутый список: видны 7 свежих карточек, старые прячем (легче телефону).
    // Кнопка разворачивает/сворачивает всю историю текущей сессии.
    function updateShowAll() {
      var n = listEl.children.length;
      if (n > 7) {
        showAllBtn.style.display = 'block';
        showAllBtn.textContent = listEl.classList.contains('show-all')
          ? 'Свернуть до 7 свежих'
          : ('Показать все (' + n + ')');
      } else {
        showAllBtn.style.display = 'none';
        listEl.classList.remove('show-all');
      }
    }
    showAllBtn.addEventListener('click', function () {
      listEl.classList.toggle('show-all');
      updateShowAll();
    });

    function beep() {
      try {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        var o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.frequency.value = 880; o.start();
        g.gain.setValueAtTime(0.2, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.15);
        o.stop(ac.currentTime + 0.16);
      } catch (e) {}
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }
    function nowTime() {
      var d = new Date();
      return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    // Короткий код единицы из порядкового номера (хвост UnitID): 1→AA001 … 999→AA999 → AB001…
    // То же, что печатается на наклейке — работник сверяет «№ AA001» на ярлыке и в карточке.
    function seqToCode(seq) {
      seq = parseInt(seq, 10);
      if (!seq || seq < 1) return '';
      var n = seq - 1, num = (n % 999) + 1, g = Math.floor(n / 999), letters = '';
      do { letters = String.fromCharCode(65 + (g % 26)) + letters; g = Math.floor(g / 26); } while (g > 0);
      while (letters.length < 2) letters = 'A' + letters;   // минимум две буквы: AA…
      return letters + ('00' + num).slice(-3);
    }

    // экранирование для вставки через innerHTML (имя товара может содержать <, & и т.п.)
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
    }

    // Запрос к складу через JSONP (обход CORS для внешней страницы).
    //   action=activate   — скан: отметить «принято» + вернуть карточку товара
    //   action=deactivate — крестик: снять отметку
    // onData получает объект {found,name,variant,photoUrl,...} либо null (нет связи).
    var jsonpId = 0;
    function callGas(action, uid, onData, extra) {
      onData = onData || function () {};
      if (!GAS) { onData(null); return; }
      var cb = 'cb_' + (++jsonpId);
      var s = document.createElement('script');
      var done = false;
      // 25с > серверного ожидания блокировки (20с): медленный, но УСПЕШНЫЙ ответ
      // (когда параллельно идёт печать и держит локу) должен дойти, а не ложно
      // показать «нет связи», хотя единица уже активирована.
      var timer = setTimeout(function () { finish(null); }, 25000);
      function finish(data) {
        if (done) return; done = true;
        clearTimeout(timer);
        try { delete window[cb]; } catch (e) { window[cb] = undefined; }
        if (s.parentNode) s.parentNode.removeChild(s);
        onData(data);
      }
      window[cb] = function (data) { finish(data); };
      s.onerror = function () { finish(null); };
      var sep = GAS.indexOf('?') >= 0 ? '&' : '?';
      var qs = 'action=' + action + '&uid=' + encodeURIComponent(uid) + '&callback=' + cb;
      if (extra) for (var k in extra) qs += '&' + k + '=' + encodeURIComponent(extra[k]);   // no/src/nick/nums
      s.src = GAS + sep + qs;
      document.body.appendChild(s);
    }

    function onScan(text) {
      if (MODE === 'order') return onScanOrder(text);   // режим «Собрать заказ» — своя логика выдачи
      if (seen[text]) return;   // этот код уже в списке — не дублируем, сколько бы ни держали камеру
      seen[text] = true;        // сбрасывается только кнопкой «Очистить»
      beep();
      if (navigator.vibrate) navigator.vibrate(80);
      total++;
      cntEl.textContent = 'Отсканировано: ' + total;

      var card = document.createElement('div');
      card.className = 'card loading';
      card.innerHTML =
        '<button class="del" type="button" aria-label="Удалить">✕</button>' +
        '<div class="thumbcol"><div class="thumb"><div class="ph">…</div></div>' +
        '<div class="unitno"></div></div>' +
        '<div class="meta"><div class="name">Записываю в таблицу…</div>' +
        '<div class="attr color"></div><div class="attr size"></div>' +
        '<div class="dupnote"></div></div>' +
        '<div class="counts"><span class="cbought"></span><span class="cscanned"></span></div>' +
        '<div class="labels"></div>';
      // номер из UnitID (последний сегмент) → короткий код наклейки «№ A001»
      card.querySelector('.unitno').textContent = '№ ' + seqToCode(String(text).split('-').pop());
      listEl.insertBefore(card, listEl.firstChild);
      // авто-очистка: в DOM держим максимум 50 карточек (самые старые удаляем) —
      // чтобы длинная сессия не грузила телефон. Полная история — в листе «Лог_сканов».
      while (listEl.children.length > 50) listEl.removeChild(listEl.lastChild);
      updateShowAll();

      // крестик — удалить карточку И снять отметку «принято» на складе.
      card._uid = text;
      card._activating = true;     // активация в полёте: deactivate отложим до ответа
      card._pendingDeact = false;
      card._fresh = false;         // true только если ИМЕННО этот скан учёл единицу (не дубль)
      card.querySelector('.del').addEventListener('click', function (e) {
        e.stopPropagation();                          // не запускать камеру / тап-вид
        // НЕблокирующее подтверждение — нативный confirm() морозит камеру на iOS.
        askConfirm('Удалить этот товар?', function () {   // пункт 7 — подтверждение
          if (card.parentNode) card.parentNode.removeChild(card);
          delete seen[text];                            // код снова можно отсканировать
          total = Math.max(0, total - 1);
          cntEl.textContent = 'Отсканировано: ' + total;
          updateShowAll();
          // если activate ещё не вернулся — снимем ПОСЛЕ него (иначе deactivate может
          // обогнать activate, и единица останется активной при удалённой карточке).
          if (card._activating) card._pendingDeact = true;
          else if (card._fresh) sendDeactivate(text);  // снимать только то, что учёл ЭТОТ скан (дубль не трогаем)
        });
      });

      // тап по карточке → переключить вид: инфо (закуплено/отсканено) ↔ список наклеек
      card.addEventListener('click', function (e) {
        card.classList.toggle('show-labels');
        e.stopPropagation();   // не дёргать запуск камеры по тапу
      });

      // скан = «принял эту единицу»: активируем на складе и рисуем карточку
      callGas('activate', text, function (data) {
        card._activating = false;
        if (card._pendingDeact) {                     // карточку уже сняли крестиком
          if (data && data.counted && !data.alreadyActive) sendDeactivate(text);  // снимаем только свежеучтённое
          return;
        }
        renderScanCard(card, data);
      });
    }

    // info = {bought, scanned, printed:[{code,scanned}]} — данные по товару+варианту.
    // Счётчики «закуп/скан»; цифра скан: меньше→красный, ровно→серый, больше→сиреневый.
    function renderCounts(card, info) {
      var bEl = card.querySelector('.cbought'), sEl = card.querySelector('.cscanned');
      if (!bEl || !sEl) return;
      if (info && (info.bought || info.bought === 0)) {
        var b = info.bought || 0, s = info.scanned || 0;
        bEl.textContent = 'закуп: ' + b;
        var col = (s < b) ? '#ff6b6b' : (s > b) ? '#c58af9' : '#9a9a9a';
        sEl.innerHTML = 'скан: <span style="color:' + col + '">' + s + '</span>';
      } else { bEl.textContent = ''; sEl.textContent = ''; }
    }
    // тап-вид: заголовок (отсканенные зелёным / неотсканенные красным); список — с новой
    // строки, отсканированные коды зелёным, неотсканированные — красным.
    function renderLabels(card, info) {
      var lEl = card.querySelector('.labels');
      if (!lEl) return;
      var arr = (info && info.printed) || [];
      if (!arr.length) { lEl.innerHTML = ''; return; }
      var parts = arr.map(function (p) {
        return '<span class="' + (p.scanned ? 'done' : 'undone') + '">' + esc(p.code) + '</span>';
      }).join(', ');
      lEl.innerHTML = '<span class="lt">Распечатанные наклейки '
        + '(<span class="done">отсканенные</span>/<span class="undone">неотсканенные</span>):</span>'
        + '<br>' + parts;
    }
    // Фон по цвету-размеру: каждому новому ключу (товар+вариант) — следующий из 10
    // оттенков по кругу (чередование по порядку появления → соседние гарантированно разные).
    var _bgShades = {}, _bgNext = 0;
    function shadeFor(key) {
      if (!(key in _bgShades)) { _bgShades[key] = _bgNext % 10; _bgNext++; }
      return _bgShades[key];
    }
    // Синхронно обновить счётчики/список + фон во ВСЕХ видимых карточках этого
    // товара+варианта (одного типа) — чтобы при каждом скане/снятии инфа совпадала.
    function applyVariantInfo(num, variant, info) {
      if (num == null) return;
      var bg   = 'bg' + shadeFor(num + '|' + variant);
      var full = !!(info && info.bought > 0 && info.scanned === info.bought);  // всё принято → зелёный фон
      var cards = listEl.children;
      for (var i = 0; i < cards.length; i++) {
        var c = cards[i];
        if (c._num === num && c._variant === variant) {
          c._info = info; renderCounts(c, info); renderLabels(c, info);
          c.classList.add(bg);                 // оттенок по цвету-размеру (идемпотентно)
          c.classList.toggle('full', full);    // зелёный, когда скан == закуп
        }
      }
    }

    // Снять активацию с проверкой ответа: при сбое (нет связи / склад занят /
    // нет в журнале) НЕ молчим — предупреждаем, чтобы отметка не осталась висеть.
    function sendDeactivate(uid) {
      callGas('deactivate', uid, function (data) {
        if (!data || !data.ok) {
          showErr('Не удалось снять отметку с одной единицы (склад занят/нет связи). ' +
                  'Отсканируйте её заново и снимите ещё раз.');
          return;
        }
        // после снятия — обновить счётчики/список во всех карточках этого типа
        applyVariantInfo(data.num, data.variant,
          { bought: data.bought, scanned: data.scanned, printed: data.printed });
      });
    }

    // Карточка по ответу activate. Зелёная — ТОЛЬКО когда реально учтено (counted).
    // Транзиентные сбои (склад занят / нет связи / наклейка ещё не дописалась в
    // журнал после печати) → жёлтая + ТИХИЙ авто-повтор той же карточки (без новой
    // карточки и без накрутки «Отсканировано» — seen НЕ трогаем). Реально «не найдено»
    // или «позиции нет на складе» → красная, без повтора.
    function renderScanCard(card, data) {
      card._fresh = !!(data && data.counted && !data.alreadyActive);   // ИМЕННО этот скан учёл (не дубль)
      var thumb   = card.querySelector('.thumb');
      var nameEl  = card.querySelector('.name');
      var colorEl = card.querySelector('.color');
      var sizeEl  = card.querySelector('.size');
      var dupEl   = card.querySelector('.dupnote');
      if (dupEl) dupEl.textContent = '';
      // название с номером впереди: «17 | костюм»
      function nm() {
        var base = (data && (data.nameRu || data.name)) || '';
        if (!base) return '№ ' + ((data && data.num) || '');
        return (data && data.num ? data.num + ' | ' : '') + base;
      }
      function fillItem() {
        // имя + цена в одну строку: «1 | костюм   33€» (цена тем же шрифтом, светло-серым)
        var price = (data && (data.price || data.price === 0))
          ? String(data.price).replace(/\s+/g, '') : '';
        nameEl.innerHTML = '<span class="nm-text">' + esc(nm()) + '</span>'
          + (price ? '<span class="pr">   ' + esc(price) + '</span>' : '');
        var cs = splitVariant(data.variant);
        colorEl.innerHTML = cs.color ? ('цвет: <span class="val">' + esc(cs.color) + '</span>') : '';
        sizeEl.innerHTML  = cs.size  ? ('размер: <span class="val">' + esc(cs.size) + '</span>') : '';
        if (data.photoUrl) {
          var img = document.createElement('img');
          img.alt = '';
          img.onerror = function () { thumb.innerHTML = '<div class="ph">📦</div>'; };
          img.src = data.photoUrl;
          thumb.innerHTML = ''; thumb.appendChild(img);
        } else { thumb.innerHTML = '<div class="ph">📦</div>'; }
      }
      // учтено → зелёная. Но если эта единица УЖЕ была пропикана ранее (дубль) —
      // красная полоса + красная подпись «товар уже есть в таблице».
      if (data && data.counted) {
        fillItem();
        card._num = data.num; card._variant = data.variant;
        // СНАЧАЛА класс состояния (он сбрасывает className), ПОТОМ фон/счётчики
        card.className = data.alreadyActive ? 'card dup' : 'card ok';
        if (data.alreadyActive && dupEl) dupEl.textContent = 'товар уже есть в таблице';
        // обновить счётчики/список/фон в ЭТОЙ карточке и во всех карточках того же типа
        applyVariantInfo(data.num, data.variant,
          { bought: data.bought, scanned: data.scanned, printed: data.printed });
        return;
      }

      // транзиентные сбои → жёлтая + повтор
      var notFlushed = data && data.error === 'not_in_log' && (data.found || data.name);
      var isBusy     = data && data.error === 'busy';
      var noConn     = !data;
      if (notFlushed || isBusy || noConn) {
        card.className = 'card warn';
        if (data && (data.found || data.name)) fillItem();
        if (isBusy)        { thumb.innerHTML = '<div class="ph">⏳</div>'; nameEl.textContent = 'Склад занят — повтор…'; }
        else if (noConn)   { thumb.innerHTML = '<div class="ph">⚠️</div>'; nameEl.textContent = 'Нет связи — повтор…'; }
        else               { nameEl.textContent = nm() + ' — учитываю, повтор…'; }
        scheduleRetry(card);
        return;
      }

      // постоянные ошибки → красная, без повтора
      card.className = 'card bad';
      if (data && data.error === 'item_missing') {
        if (data.name) fillItem();
        nameEl.textContent = nm() + ' — позиции нет на складе';
      } else {
        thumb.innerHTML = '<div class="ph">❓</div>';
        nameEl.textContent = 'Не найдено на складе';
      }
    }

    // Тихий повтор activate для ТОЙ ЖЕ карточки (без новой карточки и без total++).
    // Лечит транзиентные сбои (печать держит локу, моргнула связь, лог не дописался)
    // не плодя дубли. До 4 попыток с паузой 2с, потом оставляем жёлтую с подсказкой.
    function scheduleRetry(card) {
      if (!card._uid) return;
      card._retries = (card._retries || 0) + 1;
      if (card._retries > 4) {
        var n = card.querySelector('.name');
        if (n) n.textContent = 'Не удалось учесть — нажмите ✕ и отсканируйте заново';
        return;
      }
      setTimeout(function () {
        if (!card.parentNode) return;             // карточку убрали крестиком
        card._activating = true;
        callGas('activate', card._uid, function (data) {
          card._activating = false;
          if (card._pendingDeact) { if (data && data.counted && !data.alreadyActive) sendDeactivate(card._uid); return; }
          renderScanCard(card, data);
        });
      }, 2000);
    }

    // Разбить вариант («beige» / «beige XL» / «blue M») на цвет и размер.
    // Размер — токены S/M/L/XL… или число; всё остальное считаем цветом.
    // размер целиком в скобках («(koza)») — снимаем скобки, берём содержимое
    function cleanSize(s) {
      s = String(s || '').trim();
      var m = s.match(/^\((.+)\)$/);
      return m ? m[1].trim() : s;
    }
    function splitVariant(v) {
      v = (v || '').trim();
      if (!v) return { color: '', size: '' };
      // «milk (koza)» → цвет «milk», размер «koza» (размер в скобках в конце)
      var par = v.match(/^(.*?)\s*\(([^()]+)\)\s*$/);
      if (par) return { color: par[1].trim(), size: par[2].trim() };
      var tokens = v.split(/[\s,\/]+/).filter(Boolean);
      var sizeRe = /^(xxxs|xxs|xs|s|m|l|xl|xxl|xxxl|\d{1,3})$/i;
      var colors = [], sizes = [];
      for (var i = 0; i < tokens.length; i++) {
        if (sizeRe.test(tokens[i])) sizes.push(tokens[i].toUpperCase());
        else colors.push(tokens[i]);
      }
      return { color: colors.join(' '), size: sizes.join(' ') };
    }

    // slugify — как на сервере/в апке (makeUnitId): сопоставление варианта скана с заказом.
    function slugify(s) {
      return String(s || '').toLowerCase()
        .replace(/[\s\/|]+/g, '_')
        .replace(/[^a-z0-9_\-À-ɏЀ-ӿ]/g, '')
        .replace(/_+/g, '_')
        .replace(/^[_\-]+|[_\-]+$/g, '');
    }

    // ════════════════════ Режим «Собрать заказ» ════════════════════
    var ORDER = null;             // выгрузка заказа с сервера
    var BADGE_BY_SLOT = {};       // "num|slug" → [бейджи] (только НЕ-net позиции — цель скана)
    var statusTimer = null;
    var RETRY = {};               // uid → счётчик тихих повторов выдачи (без нижней ленты)
    var RETRY_T = {};             // uid → handle отложенного повтора (для отмены устаревших)

    function initOrderMode() {
      document.body.classList.add('order-mode');
      reloadOrder();
    }
    // подгрузка/перечитка заказа (uid не нужен — order_lookup читает src/no/nick).
    // Зовём при старте и после ручной привязки/снятия выдачи — бейджики и коды
    // наклеек берутся из АВТОРИТЕТНОГО состояния сервера (givenBySlot/uidsBySlot).
    function reloadOrder() {
      callGas('order_lookup', '', function (o) {
        renderOrderBadges(o || { found: false, items: [] });
      }, { no: ORDER_NO, src: SRC, nick: ORDER_NICK, fresh: 1 });   // fresh=1 — состав читаем СВЕЖИМ из листа (владелец мог поправить размер/цвет)
    }

    function renderOrderBadges(order) {
      ORDER = order || { found: false, items: [] };
      BADGE_BY_SLOT = {};
      var noTxt = ORDER.orderNo || ORDER_NO || '';
      var nickTxt = ORDER.nick || ORDER_NICK || '';
      document.getElementById('order-title').textContent = '🧺 Заказ ' + noTxt + (nickTxt ? ' · ' + nickTxt : '');
      var grid = document.getElementById('order-grid');
      var items = ORDER.items || [];
      if (!ORDER.found || !items.length) {
        var why = (ORDER.error === 'no_orders_sheet') ? 'в таблице нет листа «Заказы».'
                : (ORDER.error === 'src_open_failed') ? 'не удалось открыть таблицу-источник.'
                : 'проверьте номер/ник и таблицу.';
        grid.innerHTML = '<div class="ord-empty">Заказ не найден — ' + why + '</div>';
        updateOrderProgress();
        return;
      }
      // ПО ОДНОМУ бейджику на КАЖДУЮ позицию заказа: две одинаковых вещи → два бейджика
      grid.innerHTML = items.map(function (it, i) {
        var color = it.color || splitVariant(it.variant).color || '';
        var size  = cleanSize(it.size) || splitVariant(it.variant).size || '';
        var nm = it.nameRu || it.name || '';
        var attr = (color ? 'цвет: <span class="val">' + esc(color) + '</span>' : '')
                 + (color && size ? '  ' : '')
                 + (size  ? 'размер: <span class="val">' + esc(size) + '</span>' : '');
        return '<div class="obadge" data-idx="' + i + '" data-num="' + esc(it.num) + '" data-net="' + (it.hasNet ? 1 : 0) + '">'
          + '<div class="othumb"><div class="ph">📦</div></div>'
          + '<div class="ometa"><div class="oname">' + esc(it.num) + ' | ' + esc(nm) + '</div>'
          +   '<div class="oattr">' + attr + '</div></div>'
          + '<div class="ochip"></div></div>';
      }).join('');
      // карта слот → СПИСОК бейджиков (только НЕ-net — это цели скана)
      items.forEach(function (it, i) {
        var el = grid.querySelector('.obadge[data-idx="' + i + '"]');
        if (!el) return;
        el._item = it;
        el.addEventListener('click', function (e) { e.stopPropagation(); onBadgeTap(el); });
        if (it.hasNet) { setBadgeNet(el); return; }
        var slot = it.num + '|' + it.slug;
        (BADGE_BY_SLOT[slot] || (BADGE_BY_SLOT[slot] = [])).push(el);
        setBadgePending(el);
      });
      // стартовое «уже выдано» по слотам (с сервера): гасим N бейджиков каждого слота,
      // под галкой — код наклейки из uidsBySlot (тап по бейджику снимет именно её выдачу).
      var gbs = ORDER.givenBySlot || {};
      var ubs = ORDER.uidsBySlot || {};
      Object.keys(gbs).forEach(function (slot) { markSlotGiven(slot, gbs[slot], ubs[slot]); });
      updateOrderProgress();
      fetchOrderPhotos(items);
    }

    // Один бейджик = одна позиция: «ждёт» / «✓ + код наклейки» / «не хватило».
    function codeFromUid(uid) { return seqToCode(String(uid || '').split('-').pop()); }
    function setBadgePending(el) {
      if (!el) return;
      el.classList.remove('done', 'part', 'net');
      el.setAttribute('data-net', '0'); el.setAttribute('data-done', '0');
      el._uid = '';
      el.querySelector('.ochip').innerHTML = '<span class="ostate">ждёт</span>';
    }
    // uid — наклейка, закрывшая бейджик: под галкой пишем её код (AA001), запоминаем для отмены.
    function setBadgeDone(el, uid) {
      if (!el) return;
      el.classList.remove('part', 'net'); el.classList.add('done');
      el.setAttribute('data-done', '1');
      if (uid) el._uid = uid;
      var code = el._uid ? codeFromUid(el._uid) : '';
      el.querySelector('.ochip').innerHTML =
        '<span class="ostate" style="color:#7ee2a0;font-size:20px">✓</span>'
        + (code ? '<span class="ocode">' + esc(code) + '</span>' : '');
    }
    function setBadgeNet(el) {
      if (!el) return;
      el.classList.remove('done', 'part'); el.classList.add('net');
      el.setAttribute('data-net', '1'); el.setAttribute('data-done', '0');
      el.querySelector('.ochip').innerHTML = '<span class="ostate">не хватило</span>';
    }
    // погасить первые k бейджиков слота как «выдано» (с кодами из uids), остальные — «ждёт»
    function markSlotGiven(slot, k, uids) {
      var arr = BADGE_BY_SLOT[slot] || [];
      uids = uids || [];
      for (var i = 0; i < arr.length; i++) {
        if (i < k) setBadgeDone(arr[i], uids[i]); else setBadgePending(arr[i]);
      }
    }
    // тап по закрытому (зелёному) бейджику = снять его выдачу — нижней ленты с крестиком больше нет
    function onBadgeTap(el) {
      if (!el || el.getAttribute('data-done') !== '1') return;
      if (!el._uid) { setStatus('warn', 'Не знаю код этой выдачи — обновите заказ.'); return; }
      var uid = el._uid;
      askConfirm('Снять выдачу этой вещи?', function () { sendUnsell(uid); });   // НЕблокирующее — confirm() морозит камеру на iOS
    }

    // Обновить бейджи слота по ответу сервера (given — авторитетное число с сервера).
    // Только что закрытому бейджику отдаём uid этого скана (для кода/отмены); прежние — свой.
    function updateOrderBadge(data, flash) {
      if (!data || !data.num) return;
      var slot = data.num + '|' + slugify(data.variant);
      var arr = BADGE_BY_SLOT[slot];
      // слота нет в текущей раскладке → бейджики построены по УСТАРЕВШЕМУ составу (заказ
      // поправили между открытием и сканом). Перечитываем свежим — бейджики перестроятся
      // и зажгут уже выданное по givenBySlot с сервера.
      if (!arr || !arr.length) { reloadOrder(); return; }
      var given = Math.max(0, Math.min(data.given != null ? data.given : 0, arr.length));
      for (var i = 0; i < arr.length; i++) {
        if (i < given) setBadgeDone(arr[i], (flash && i === given - 1) ? data.uid : undefined);
        else setBadgePending(arr[i]);
      }
      if (flash && given > 0) {
        var el = arr[given - 1];          // бейджик, который только что закрыли
        el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
        try { el.scrollIntoView({ block: 'nearest' }); } catch (e) {}
      }
      updateOrderProgress();
    }

    function updateOrderProgress() {
      var pe = document.getElementById('order-progress');
      if (!ORDER) { pe.textContent = ''; return; }
      var need = 0, given = 0;
      Array.prototype.forEach.call(document.querySelectorAll('#order-grid .obadge'), function (el) {
        if (el.getAttribute('data-net') === '1') return;
        need++;
        if (el.getAttribute('data-done') === '1') given++;
      });
      var sum = (ORDER.totalSum != null) ? ORDER.totalSum : 0;
      var cnt = (ORDER.totalCount != null) ? ORDER.totalCount : need;
      var net = ORDER.netCount || 0;
      if (need > 0 && given >= need) {
        pe.textContent = '✅ Заказ собран · ' + cnt + ' поз. · ' + sum + ' €' + (net ? ' · ' + net + ' не хватило' : '');
        pe.classList.add('done');
      } else {
        pe.textContent = 'Выдано ' + given + ' из ' + need + ' · ' + cnt + ' поз. · ' + sum + ' €'
                       + (net ? ' · ' + net + ' не хватило' : '');
        pe.classList.remove('done');
      }
    }

    function fetchOrderPhotos(items) {
      var seenN = {}, nums = [];
      items.forEach(function (it) { if (!seenN[it.num]) { seenN[it.num] = true; nums.push(it.num); } });
      if (!nums.length) return;
      callGas('order_photos', '', function (map) {
        if (!map) return;
        Array.prototype.forEach.call(document.querySelectorAll('#order-grid .obadge'), function (el) {
          var url = map[el.getAttribute('data-num')];
          if (!url) return;
          var th = el.querySelector('.othumb');
          var img = document.createElement('img'); img.alt = '';
          img.onerror = function () { th.innerHTML = '<div class="ph">📦</div>'; };
          img.src = url; th.innerHTML = ''; th.appendChild(img);
        });
      }, { src: SRC, nums: nums.join(',') });
    }

    function setStatus(kind, msg) {
      var box = document.getElementById('scan-status');
      box.className = 'show ' + kind;
      box.querySelector('.msg').textContent = msg;
      if (statusTimer) clearTimeout(statusTimer);
      statusTimer = setTimeout(function () {
        box.className = box.className.replace('show', '').replace(/\s+/g, ' ').trim();
      }, kind === 'bad' ? 6000 : 3500);
    }

    function shortName(data) {
      var cs = splitVariant(data.variant);
      var v = [cs.color, cs.size].filter(Boolean).join(' ');
      return (data.num || '') + ' ' + (data.name || '') + (v ? ' (' + v + ')' : '');
    }

    // === Скан в режиме заказа: без нижней ленты — результат на бейджиках + баннере + попапе ===
    function onScanOrder(text) {
      if (seen[text]) return;   // тот же код в этой сессии — тихо игнор (камера часто читает дважды)
      seen[text] = true;
      beep();
      if (navigator.vibrate) navigator.vibrate(60);
      RETRY[text] = 0;
      callGas('sell', text, function (data) { handleSellResult(text, data); },
              { no: ORDER_NO, src: SRC, nick: ORDER_NICK });
    }

    // Разбор ответа выдачи: совпало → зелёный бейджик + код; расхождение → попап выбора
    // позиции; лишнее/уже выдано → баннер; транзиентный сбой → тихий повтор (без карточки).
    function handleSellResult(uid, data) {
      if (!data || data.error === 'busy' || data.error === 'not_in_log') {
        if (!data)                      setStatus('warn', 'Нет связи — повтор…');
        else if (data.error === 'busy') setStatus('warn', 'Склад занят — повтор…');
        else                            setStatus('warn', 'Наклейка ещё пишется — повтор…');
        scheduleRetrySell(uid);
        return;
      }
      switch (data.match) {
        case 'ok':
          clearPendingRetries();               // определённый исход — гасим устаревшие повторы
          closeMismatchPopup(true);            // успешный скан закрывает попап прежнего расхождения
          updateOrderBadge(data, true);
          setStatus('ok', '✓ ' + shortName(data));
          break;
        case 'already':
          // бейджик уже зелёный из загрузки заказа; у привязанной вручную наклейки свой слот
          // пуст (кредит ушёл назначенной позиции) — поэтому бейджики НЕ трогаем, только баннер.
          setStatus('warn', '⚠ Уже выдано раньше: ' + shortName(data));
          break;
        case 'overscan':
          // лишняя вещь: показываем попап «Вы отсканировали…» (информативно, без привязки —
          // вариант-то совпал, просто этого товара уже достаточно). Вне заказа — баннер.
          if (ORDER && ORDER.found) { data._overscan = true; openMismatchPopup(data); }
          else setStatus('bad', '✗ Лишняя штука: ' + shortName(data) + ' (нужно ' + (data.need || 0) + ')');
          break;
        case 'wrong_order':
        case 'net_item':
          openMismatchPopup(data);             // «Товар отличается от заказа» — выбрать позицию
          break;
        default:
          if (data.error === 'item_missing') setStatus('bad', '✗ Нет на складе: ' + shortName(data));
          else setStatus('bad', '✗ Не найдено: ' + shortName(data));
      }
    }

    // Тихий повтор выдачи (транзиентные сбои) — без карточки, по uid. До 4 попыток.
    function scheduleRetrySell(uid) {
      RETRY[uid] = (RETRY[uid] || 0) + 1;
      if (RETRY[uid] > 4) {
        setStatus('bad', 'Не удалось учесть — отсканируйте наклейку заново.');
        delete seen[uid]; delete RETRY_T[uid];      // дать пересканировать
        return;
      }
      RETRY_T[uid] = setTimeout(function () {
        delete RETRY_T[uid];
        callGas('sell', uid, function (data) { handleSellResult(uid, data); },
                { no: ORDER_NO, src: SRC, nick: ORDER_NICK });
      }, 2000);
    }
    // Отменить ВСЕ отложенные повторы (когда случилось определённое событие — успешный скан,
    // привязка, открытие попапа), чтобы устаревший повтор не всплыл поверх текущей работы.
    // Их наклейки освобождаем из seen — при необходимости их пересканируют.
    function clearPendingRetries() {
      for (var u in RETRY_T) { try { clearTimeout(RETRY_T[u]); } catch (e) {} delete seen[u]; }
      RETRY_T = {};
    }

    function sendUnsell(uid) {
      callGas('unsell', uid, function (data) {
        if (!data || !data.ok) { setStatus('warn', 'Не удалось снять выдачу (склад занят/нет связи). Повторите.'); return; }
        delete seen[uid];                      // снятую наклейку можно сканировать заново
        setStatus('ok', 'Выдача снята: ' + shortName(data));
        reloadOrder();                         // авторитетно перерисует бейджики/коды/прогресс
      }, { no: ORDER_NO, src: SRC, nick: ORDER_NICK });
    }

    // ─── Попап «Товар отличается от заказа» ───
    // Тикабельность: тот же № есть в заказе → частичное расхождение, тикать можно ТОЛЬКО
    // незакрытые позиции этого же № (подбор цвета/размера). Нет такого № → замена: тикать
    // можно любую незакрытую позицию. Уже выданные и «не хватило» — серые, недоступны.
    function openMismatchPopup(data) {
      var pop = document.getElementById('mismatch-popup');
      clearPendingRetries();                    // открыли попап — устаревшие повторы по др. наклейкам гасим
      if (pop.style.display !== 'none' && pop._uid && pop._uid !== data.uid) delete seen[pop._uid];  // прежнее расхождение бросаем
      var cs = splitVariant(data.variant);
      var scanNum = String(data.num || '');
      var name = (data.nameRu || data.name || '');
      var items = (ORDER && ORDER.items) || [];
      var scanNumInOrder = items.some(function (it) { return !it.hasNet && String(it.num) === scanNum; });

      // размер/цвет скана (best-effort) — для определения, ЧТО именно не совпало
      var scanColor = cs.color, scanSize = cs.size;
      // незакрытые позиции этого же № — для сравнения цвет/размер
      var sameNum = [];
      items.forEach(function (it, i) {
        if (String(it.num) !== scanNum) return;
        var el = document.querySelector('#order-grid .obadge[data-idx="' + i + '"]');
        if (el && el.getAttribute('data-done') === '1') return;
        if (it.hasNet || (el && el.getAttribute('data-net') === '1')) return;
        sameNum.push(it);
      });
      // ПРАВКА 4: ЧТО не совпало — номер / цвет / размер (overscan — отдельный вид: лишняя вещь)
      var overscan = !!data._overscan;
      var diffKind;
      if (overscan) diffKind = 'overscan';
      else if (!scanNumInOrder) diffKind = 'num';
      else {
        var colorMatch = false, sizeMatch = false;
        sameNum.forEach(function (it) {
          var oc = slugify(it.color || ''), os = slugify(cleanSize(it.size) || '');
          if (oc && oc === slugify(scanColor)) colorMatch = true;
          if (os && os === slugify(scanSize)) sizeMatch = true;
        });
        diffKind = (colorMatch && !sizeMatch) ? 'size'
                 : (sizeMatch && !colorMatch) ? 'color' : 'both';
      }
      var mTitle = diffKind === 'overscan' ? 'Этого товара уже достаточно'
                 : diffKind === 'num'   ? 'Не совпал номер'
                 : diffKind === 'size'  ? 'Не совпадает размер'
                 : diffKind === 'color' ? 'Не совпадает цвет'
                 :                        'Не совпадает цвет/размер';

      // список позиций заказа БЕЗ уже выданных (зелёных)
      var rows = items.map(function (it, i) {
        var el = document.querySelector('#order-grid .obadge[data-idx="' + i + '"]');
        if (el && el.getAttribute('data-done') === '1') return '';     // уже выдано — не показываем
        var net  = it.hasNet || !!(el && el.getAttribute('data-net') === '1');
        var color = it.color || splitVariant(it.variant).color || '';
        var size  = cleanSize(it.size) || splitVariant(it.variant).size || '';
        var nm = it.nameRu || it.name || '';
        var attr = (color ? 'цвет: <span class="val">' + esc(color) + '</span>' : '')
                 + (color && size ? '  ' : '')
                 + (size ? 'размер: <span class="val">' + esc(size) + '</span>' : '');
        var pickable = !overscan && !net && (scanNumInOrder ? (String(it.num) === scanNum) : true);
        var stateTxt = net ? '<div class="mob-state">не хватило</div>' : '';
        var cls = 'mob' + (pickable ? ' pick' : ' disabled') + (net ? ' net' : '');
        return '<div class="' + cls + '" data-idx="' + i + '"'
          + (pickable ? ' data-num="' + esc(it.num) + '" data-slug="' + esc(it.slug) + '"' : '')
          + '><div class="mob-thumb"><div class="ph">📦</div></div>'
          + '<div class="mob-meta"><div class="mob-name">' + esc(it.num) + ' | ' + esc(nm) + '</div>'
          +   '<div class="mob-attr">' + attr + '</div>' + stateTxt + '</div>'
          + '<div class="mob-check">' + (pickable ? '✓' : '') + '</div></div>';
      }).join('');

      // строка варианта скана (с размером); артикул НЕ показываем
      var scanVarLine = scanSize
        ? ('цвет: <span class="val">' + esc(scanColor) + '</span>&nbsp;&nbsp;размер: <span class="val">' + esc(scanSize) + '</span>')
        : (data.variant ? ('вариант: <span class="val">' + esc(data.variant) + '</span>') : '');

      // overscan = вариант совпал, но этого товара уже достаточно → информативно, без привязки
      var titleSym = overscan ? '⚠' : '✗';
      var titleCls = overscan ? 'mpop-title warn' : 'mpop-title';
      var pickHint = overscan
        ? ('Этого товара по заказу уже выдано сколько нужно (' + (data.need || 0) + ' шт). Отложите лишнюю вещь или сканируйте другой товар.')
        : 'Выберите соответствующий вашему скану заказ клиента или сканируйте другой товар.';
      var emptyTxt = overscan ? 'Эта вещь в заказе больше не нужна. Отложите её или сканируйте другой товар.'
                              : 'Нет подходящих позиций. Отсканируйте другой товар.';

      pop.innerHTML =
        '<div class="mpop-panel">'
        + '<div class="' + titleCls + '"><span class="x">' + titleSym + '</span>' + mTitle + '</div>'
        + '<div class="mpop-pick">Вы отсканировали:</div>'
        + '<div class="mpop-scan"><div class="mphoto"><div class="ph">📦</div></div>'
        +   '<div class="minfo"><div class="mname">' + esc(scanNum + (name ? ' | ' + name : '')) + '</div>'
        +     (scanVarLine ? '<div class="mrow">' + scanVarLine + '</div>' : '')
        +   '</div></div>'
        + '<div class="mpop-pick">' + esc(pickHint) + '</div>'
        + '<div class="mpop-list">' + (rows || '<div class="mpop-sub">' + esc(emptyTxt) + '</div>') + '</div>'
        + '<div class="mpop-foot"><button type="button" class="mpop-close">Сканировать другой товар</button></div>'
        + '</div>';

      pop._uid = data.uid;
      pop.style.display = 'flex';
      // фото отсканированного товара (средний размер)
      if (data.photoUrl) {
        var mph = pop.querySelector('.mphoto');
        var mimg = document.createElement('img'); mimg.alt = '';
        mimg.onerror = function () { mph.innerHTML = '<div class="ph">📦</div>'; };
        mimg.src = data.photoUrl; mph.innerHTML = ''; mph.appendChild(mimg);
      }
      copyGridPhotosToPopup();                  // фото позиций берём из уже загруженной сетки
      pop.onclick = function (e) {
        e.stopPropagation();                                          // не запускать камеру под попапом
        if (e.target === pop) { closeMismatchPopup(true); return; }   // клик по фону — закрыть
        var row = e.target.closest ? e.target.closest('.mob.pick') : null;
        if (row) { row.classList.add('sel'); assignScanToOrder(pop._uid, row.getAttribute('data-num'), row.getAttribute('data-slug')); return; }
        if (e.target.closest && e.target.closest('.mpop-close')) closeMismatchPopup(true);
      };
    }

    // перенести уже загруженные фото позиций из сетки в попап (без повторной загрузки)
    function copyGridPhotosToPopup() {
      var pop = document.getElementById('mismatch-popup');
      Array.prototype.forEach.call(pop.querySelectorAll('.mob'), function (mob) {
        var i = mob.getAttribute('data-idx');
        var gimg = document.querySelector('#order-grid .obadge[data-idx="' + i + '"] .othumb img');
        if (gimg && gimg.getAttribute('src')) {
          var th = mob.querySelector('.mob-thumb');
          var img = document.createElement('img'); img.alt = '';
          img.onerror = function () { th.innerHTML = '<div class="ph">📦</div>'; };
          img.src = gimg.src; th.innerHTML = ''; th.appendChild(img);
        }
      });
    }

    function closeMismatchPopup(clearSeen) {
      var pop = document.getElementById('mismatch-popup');
      if (!pop || pop.style.display === 'none') return;
      if (clearSeen && pop._uid) delete seen[pop._uid];   // закрыли без привязки → можно пересканировать
      pop.style.display = 'none';
      pop.innerHTML = '';
      pop._uid = '';
    }

    // Тик по позиции в попапе → привязать наклейку к ней на сервере (action=assign).
    function assignScanToOrder(uid, anum, aslug) {
      if (!uid) return;
      setStatus('ok', 'Привязываю…');
      callGas('assign', uid, function (data) {
        // 'already' = наклейка уже выдана (ответ прошлой привязки потерялся при таймауте) —
        // на сервере данные уже верны, просто перечитываем авторитетное состояние, а не ругаемся.
        var done = data && (data.match === 'ok' || data.match === 'already');
        if (!done) {
          setStatus('bad', 'Не удалось привязать (' + ((data && (data.error || data.match)) || 'нет связи') + '). Повторите.');
          return;
        }
        clearPendingRetries();
        closeMismatchPopup(false);                          // привязано → seen НЕ чистим (наклейка выдана)
        setStatus('ok', (data.match === 'already' ? '✓ Уже привязано: ' : '✓ Привязано: ') + shortName(data));
        reloadOrder();                                      // авторитетно зажжёт выбранный бейджик + код
      }, { no: ORDER_NO, src: SRC, nick: ORDER_NICK, anum: anum, aslug: aslug });
    }

    // auto=true — тихая попытка включить камеру при открытии страницы. Сработает,
    // если доступ к камере уже разрешён (iPhone запоминает разрешение для сайта).
    // Если нет — просто показываем кнопку, без красной ошибки (в первый раз iOS
    // требует включать камеру по нажатию). auto=false — нажали кнопку вручную.
    function start(auto) {
      showErr('');
      if (typeof Html5Qrcode === 'undefined') {
        if (!auto) showErr('Не удалось загрузить библиотеку сканера (нет интернета?).');
        startBtn.style.display = 'block';
        return;
      }
      if (qr) return;
      startBtn.style.display = 'none';        // прячем кнопку на время попытки
      qr = new Html5Qrcode('reader');
      qr.start(
        { facingMode: 'environment' },
        // qrbox = центральная область кадра (~70%): декодер обрабатывает не весь
        // кадр, а только центр (куда наводят QR) → заметно меньше нагрузка на телефон,
        // меньше пропусков при серийном скане. Наводить QR по-прежнему в рамку .aim.
        { fps: 10, qrbox: function (vw, vh) { var s = Math.floor(Math.min(vw, vh) * 0.7); return { width: s, height: s }; } },
        onScan,
        function () {}                       // ошибки отдельных кадров игнорируем
      ).then(function () {
        startBtn.style.display = 'none';
        aim.style.display = 'block';
      }).catch(function (e) {
        qr = null;
        document.getElementById('reader').innerHTML = '';   // чтобы блок схлопнулся
        aim.style.display = 'none';
        startBtn.style.display = 'block';     // не вышло — показываем кнопку
        if (!auto) showErr('Камера недоступна: ' + e + '. Разрешите доступ к камере для этого сайта.');
      });
    }

    startBtn.addEventListener('click', function () { start(false); });
    document.getElementById('clear').addEventListener('click', function () {
      listEl.innerHTML = ''; total = 0; seen = {}; cntEl.textContent = 'Отсканировано: 0';
      listEl.classList.remove('show-all'); updateShowAll();
    });

    // Пробуем включить камеру сразу при открытии. Если доступ ещё не разрешён
    // (первый заход на iPhone) — покажется кнопка «Включить камеру».
    start(true);

    // iPhone не даёт включить камеру без касания страницы (правило Safari).
    // Поэтому касание В ЛЮБОМ месте экрана тоже включает камеру — не нужно
    // целиться в кнопку. start() сам ничего не делает, если камера уже идёт.
    document.addEventListener('click', function () { start(false); });

    // Режим «Собрать заказ»: подгрузить заказ и показать бейджики (камера уже стартует выше).
    if (MODE === 'order') initOrderMode();
  </script>
</body>
</html>
