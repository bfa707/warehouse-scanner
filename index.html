<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Сканер склада</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #111; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .bar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #000; position: sticky; top: 0; z-index: 5; }
  .bar h1 { font-size: 20px; margin: 0; font-weight: 600; }
  #reader { width: 100%; max-width: 640px; margin: 0 auto; }
  #reader video { width: 100% !important; height: auto !important; display: block; }
  .start { display: block; width: calc(100% - 32px); max-width: 520px; margin: 28px auto 8px;
           font-size: 26px; font-weight: 700; background: #0b8043; color: #fff; border: none;
           border-radius: 14px; padding: 22px 24px; cursor: pointer; }
  .stop  { display: none; width: calc(100% - 32px); max-width: 520px; margin: 12px auto;
           font-size: 18px; background: #333; color: #fff; border: none; border-radius: 12px;
           padding: 14px 24px; cursor: pointer; }
  .hint { text-align: center; color: #aaa; font-size: 16px; padding: 12px 16px; }
  .err  { color: #ff7676; text-align: center; padding: 14px 16px; font-size: 16px; }
  .head { display: flex; align-items: center; justify-content: space-between;
          max-width: 640px; margin: 8px auto 0; padding: 0 16px; }
  .head h2 { font-size: 16px; color: #aaa; font-weight: 500; margin: 14px 0 8px; }
  .clear { background: none; color: #6cb2ff; border: none; font-size: 15px; cursor: pointer; }
  .list { max-width: 640px; margin: 0 auto; padding: 0 16px 28px; }
  .row { background: #1d1d1d; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px;
         font-family: ui-monospace, Menlo, monospace; font-size: 18px; word-break: break-all; }
  .row .t { color: #777; font-size: 12px; font-family: -apple-system, sans-serif; margin-top: 4px; }
</style>
</head>
<body>
  <div class="bar"><h1>📷 Сканер склада</h1></div>

  <button id="start" class="start" type="button">▶ Включить камеру</button>
  <button id="stop" class="stop" type="button">■ Остановить</button>
  <div id="reader"></div>
  <div class="hint">Наведите камеру на QR-код — он распознаётся сам, фотографировать не нужно.</div>
  <div id="err" class="err"></div>

  <div class="head"><h2 id="cnt">Отсканировано: 0</h2><button id="clear" class="clear" type="button">Очистить</button></div>
  <div id="list" class="list"></div>

  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    var qr = null, seen = {}, total = 0;
    var startBtn = document.getElementById('start');
    var stopBtn  = document.getElementById('stop');
    var errBox   = document.getElementById('err');
    var listEl   = document.getElementById('list');
    var cntEl    = document.getElementById('cnt');

    function showErr(t) { errBox.textContent = t || ''; }

    function beep() {
      try {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        var o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.frequency.value = 880; o.start();
        g.gain.setValueAtTime(0.2, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.15);
        o.stop(ac.currentTime + 0.16);
      } catch (e) {}
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }
    function onScan(text) {
      var now = new Date().getTime();
      if (seen[text] && now - seen[text] < 2500) return;   // тот же код < 2.5с — игнор
      seen[text] = now;
      beep();
      if (navigator.vibrate) navigator.vibrate(80);
      total++;
      cntEl.textContent = 'Отсканировано: ' + total;
      var d = new Date();
      var row = document.createElement('div');
      row.className = 'row';
      row.textContent = text;
      var t = document.createElement('div');
      t.className = 't';
      t.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
      row.appendChild(t);
      listEl.insertBefore(row, listEl.firstChild);
    }

    function start() {
      showErr('');
      if (typeof Html5Qrcode === 'undefined') {
        showErr('Не удалось загрузить библиотеку сканера (нет интернета?).'); return;
      }
      if (qr) return;
      qr = new Html5Qrcode('reader');
      qr.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScan,
        function () {}                       // ошибки отдельных кадров игнорируем
      ).then(function () {
        startBtn.style.display = 'none';
        stopBtn.style.display = 'block';
      }).catch(function (e) {
        qr = null;
        showErr('Камера недоступна: ' + e + '. Разрешите доступ к камере для этого сайта.');
      });
    }

    function stop() {
      if (!qr) return;
      qr.stop().then(function () { try { qr.clear(); } catch (e) {} qr = null;
        startBtn.style.display = 'block'; stopBtn.style.display = 'none';
      }).catch(function () { qr = null; });
    }

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', stop);
    document.getElementById('clear').addEventListener('click', function () {
      listEl.innerHTML = ''; total = 0; seen = {}; cntEl.textContent = 'Отсканировано: 0';
    });
  </script>
</body>
</html>
